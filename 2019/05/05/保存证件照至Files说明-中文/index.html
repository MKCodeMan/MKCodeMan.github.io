      <h1 id="前言"><a href="#前言" class="headerlink" title="前言"></a>前言</h1><p>当您对证件照的的品质要求比较高时,且您的系统高于或等于iOS 11,您可以使用保存至<strong>文件</strong>的方式来保存您制作的证件照,</p>
<h1 id="步骤"><a href="#步骤" class="headerlink" title="步骤"></a>步骤</h1><h1 id="1-点击保存至文件"><a href="#1-点击保存至文件" class="headerlink" title="1,点击保存至文件"></a>1,点击保存至文件</h1><p><img src="/images/保存证件照至Files说明/1.png" alt="保存至文件"></p>
<h1 id="2-在文件中找到证照"><a href="#2-在文件中找到证照" class="headerlink" title="2,在文件中找到证照"></a>2,在文件中找到证照</h1><p>如果您的iOS系统大于等于11.0,则可以找到App<strong>文件</strong><br><img src="/images/保存证件照至Files说明/2.png" alt="文件App"></p>
<p>点击<strong>我的 iPhone</strong> 进入找到本App的文件夹进入<br><img src="/images/保存证件照至Files说明/3.png" alt="Files首页"></p>
<p><img src="/images/保存证件照至Files说明/4.png" alt="Files中本App文件件"></p>
<p>然后您就能找到您所有保存至<strong>文件</strong>的证件照了,里面包括 单张证件照,冲印版证件照,和前面两张的压缩包<br><img src="/images/保存证件照至Files说明/5.png" alt="证照文件夹"></p>
